name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'cli.py'
      - 'cli.spec'
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - 'cli.py'
      - 'cli.spec'
      - 'src/**'

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: xhs-cli.exe
            spec_path: "cli.spec"
          - platform: macos-latest
            artifact: xhs-cli
            spec_path: "cli.spec"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build CLI (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          pyinstaller cli.spec

      - name: Build CLI (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          pyinstaller cli.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-cli
          path: dist/${{ matrix.artifact }}
          retention-days: 30

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: xhs_idea_tool.exe
          - platform: macos-latest
            artifact: xhs_idea_tool.app
          - platform: ubuntu-latest
            artifact: xhs_idea_tool

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install firefox
          playwright install webkit

      - name: Build with PyInstaller (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          pyinstaller --onefile --name xhs_idea_tool --add-data "src;src" --add-data "gui;gui" main.spec

      - name: Build with PyInstaller (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          pyinstaller --onefile --name xhs_idea_tool --add-data "src:src" --add-data "gui:gui" main.spec

      - name: Build with PyInstaller (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --name xhs_idea_tool --add-data "src:src" --add-data "gui:gui" main.spec

      - name: Prepare artifact
        id: prepare
        run: |
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            echo "dir=dist" >> $GITHUB_OUTPUT
            echo "file=xhs_idea_tool.exe" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.platform }}" == "macos-latest" ]; then
            cd dist
            mkdir -p xhs_idea_tool.app/Contents/MacOS
            mv xhs_idea_tool xhs_idea_tool.app/Contents/MacOS/
            cd ..
            echo "dir=dist" >> $GITHUB_OUTPUT
            echo "file=xhs_idea_tool.app" >> $GITHUB_OUTPUT
          else
            echo "dir=dist" >> $GITHUB_OUTPUT
            echo "file=xhs_idea_tool" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-desktop
          path: ${{ steps.prepare.outputs.dir }}/${{ steps.prepare.outputs.file }}
          retention-days: 30

  release:
    needs: [build-cli, build-desktop]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f -name "*"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
